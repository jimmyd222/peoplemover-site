<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a1430">
<meta name="robots" content="index, follow">
<title>PeopleMover · Always Boarding</title>
<meta name="description" content="A love letter from Quinn, Lisa & Jim to a slow blue tram.">
<meta property="og:type" content="website">
<meta property="og:title" content="PeopleMover · Always Boarding">
<meta property="og:description" content="A love letter from Quinn, Lisa & Jim to a slow blue tram.">
<meta property="og:url" content="https://peoplemover.me/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800&family=Outfit:wght@300;400;500&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a1430;
    --bg-deeper: #050a1c;
    --cream: #f4ead5;
    --cream-dim: #b9ad94;
    --amber: #f0a83a;
    --amber-glow: #ffc266;
    --teal: #4fc3d9;
    --rail: #2a3a5e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Outfit', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(ellipse at 50% 30%, #1a2855 0%, var(--bg) 45%, var(--bg-deeper) 100%);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  /* Subtle starfield */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 12% 18%, rgba(244,234,213,.55), transparent 50%),
      radial-gradient(1px 1px at 27% 72%, rgba(244,234,213,.4), transparent 50%),
      radial-gradient(1.2px 1.2px at 43% 25%, rgba(255,194,102,.5), transparent 50%),
      radial-gradient(1px 1px at 58% 62%, rgba(244,234,213,.45), transparent 50%),
      radial-gradient(1px 1px at 71% 14%, rgba(244,234,213,.5), transparent 50%),
      radial-gradient(1px 1px at 84% 78%, rgba(244,234,213,.4), transparent 50%),
      radial-gradient(1.2px 1.2px at 92% 38%, rgba(79,195,217,.5), transparent 50%),
      radial-gradient(1px 1px at 6% 88%, rgba(244,234,213,.35), transparent 50%);
    background-repeat: no-repeat;
    animation: twinkle 6s ease-in-out infinite;
  }
  /* Faint film grain */
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background:
      repeating-linear-gradient(0deg, rgba(244,234,213,.015) 0, rgba(244,234,213,.015) 1px, transparent 1px, transparent 3px);
    opacity: .6;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50%      { opacity: .55; }
  }

  main {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 24px 100px;
    text-align: center;
  }

  .eyebrow {
    font-family: 'VT323', monospace;
    font-size: 16px;
    letter-spacing: .42em;
    color: var(--amber);
    margin-bottom: 28px;
    display: inline-flex; align-items: center; gap: 12px;
  }
  .eyebrow::before, .eyebrow::after {
    content: ""; width: 28px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
  }
  .eyebrow::after { background: linear-gradient(90deg, var(--amber), transparent); }
  .eyebrow::before { background: linear-gradient(90deg, transparent, var(--amber)); }

  h1 {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 800;
    font-size: clamp(64px, 14vw, 156px);
    line-height: .88;
    letter-spacing: -.01em;
    color: var(--cream);
    margin-bottom: 28px;
    text-shadow: 0 0 60px rgba(240,168,58,.15);
  }
  h1 em {
    font-style: normal;
    color: var(--amber);
    background: linear-gradient(105deg, var(--amber) 0%, var(--amber-glow) 50%, var(--amber) 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 5s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  .esp {
    font-family: 'Outfit', sans-serif;
    font-style: italic; font-weight: 300;
    font-size: clamp(14px, 1.6vw, 17px);
    color: rgba(244,234,213,.5);
    letter-spacing: .04em;
    margin-bottom: 36px;
    margin-top: -8px;
  }
  .tagline {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: clamp(17px, 2.2vw, 22px);
    color: var(--cream-dim);
    max-width: 40ch;
    line-height: 1.5;
    margin-bottom: 64px;
    letter-spacing: .01em;
  }
  .tagline strong {
    color: var(--cream); font-weight: 500;
  }

  /* Tram + track scene */
  .scene {
    position: relative;
    width: 100%; max-width: 720px;
    height: 140px;
    margin-bottom: 56px;
    overflow: hidden;
  }
  .space-mtn {
    position: absolute;
    right: 8%; bottom: 24px;
    width: 110px; height: 90px;
    opacity: .85;
    pointer-events: none;
  }
  @media (max-width: 520px) {
    .space-mtn { right: 4%; width: 84px; height: 70px; }
  }
  .track {
    position: absolute; left: 0; right: 0; bottom: 28px; height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--rail) 12%, var(--rail) 88%, transparent 100%);
  }
  .track::after {
    content: ""; position: absolute; left: 12%; right: 12%; bottom: -6px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(79,195,217,.35), transparent);
    filter: blur(2px);
  }
  .tram-wrap {
    position: absolute; bottom: 30px; left: -260px;
    animation: glide 22s linear infinite;
  }
  @keyframes glide {
    0%   { transform: translateX(0); }
    100% { transform: translateX(calc(100vw + 260px)); }
  }
  .tram-wrap svg { display: block; }

  /* Tiny info strip */
  .strip {
    font-family: 'VT323', monospace;
    font-size: 17px;
    letter-spacing: .25em;
    color: var(--teal);
    display: inline-flex; align-items: center; gap: 14px;
    padding: 8px 18px;
    border: 1px solid rgba(79,195,217,.25);
    border-radius: 2px;
    background: rgba(10,20,48,.4);
  }
  .strip .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 10px var(--teal);
    animation: blink 1.6s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: .25; }
  }

  footer {
    position: fixed; bottom: 22px; left: 0; right: 0;
    text-align: center;
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: .32em;
    text-transform: uppercase;
    color: rgba(244,234,213,.32);
    z-index: 2;
  }
  footer a { color: inherit; text-decoration: none; transition: color .25s; }
  footer a:hover { color: var(--amber); }

  @media (max-width: 520px) {
    main { padding: 50px 18px 90px; }
    .eyebrow { font-size: 14px; letter-spacing: .35em; }
    .eyebrow::before, .eyebrow::after { width: 18px; }
    .tagline { margin-bottom: 44px; }
    .scene { height: 90px; margin-bottom: 40px; }
    .tram-wrap { transform: scale(.78); transform-origin: left bottom; }
    .strip { font-size: 15px; letter-spacing: .2em; padding: 6px 14px; }
    footer { font-size: 12px; }
  }
  @media (prefers-reduced-motion: reduce) {
    body::before, h1 em, .strip .dot { animation: none; }
    .tram-wrap { animation: none; left: 50%; transform: translateX(-50%); }
  }
</style>
</head>
<body>
<main>
  <div class="eyebrow">Tomorrowland Transit Authority · WEDway</div>
  <h1>Please stand clear<br>of the <em>doors</em>.</h1>
  <p class="esp"><em>Por favor manténgase alejado de las puertas.</em></p>
  <p class="tagline">A love letter from <strong>Quinn</strong>, <strong>Lisa</strong> &amp; <strong>Jim</strong><br>to the best ride in the Magic Kingdom.</p>

  <div class="scene" aria-hidden="true">
    <!-- Space Mountain silhouette in the distance -->
    <svg class="space-mtn" viewBox="0 0 180 90" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYEnd meet">
      <defs>
        <linearGradient id="mtnGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#1d2c54" stop-opacity=".9"/>
          <stop offset="100%" stop-color="#0a1430" stop-opacity=".6"/>
        </linearGradient>
      </defs>
      <!-- Cone with ridged spires -->
      <path d="M90 6 L72 86 L108 86 Z" fill="url(#mtnGrad)"/>
      <path d="M90 6 L80 86 M90 6 L100 86 M90 6 L88 86 M90 6 L92 86" stroke="#3a4a6e" stroke-width=".6" opacity=".5"/>
      <!-- Spire tip -->
      <circle cx="90" cy="6" r="1.4" fill="#ffc266"/>
      <circle cx="90" cy="6" r="3" fill="#ffc266" opacity=".25"/>
    </svg>
    <div class="track"></div>
    <div class="tram-wrap">
      <!-- PeopleMover: 3 connected cars, blue & cream, bubble windows -->
      <svg width="240" height="62" viewBox="0 0 240 62" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="carBody" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="#5aa9d6"/>
            <stop offset="55%" stop-color="#2e6fa8"/>
            <stop offset="100%" stop-color="#1d4b7a"/>
          </linearGradient>
          <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="#fff7e0"/>
            <stop offset="100%" stop-color="#f0a83a" stop-opacity=".55"/>
          </linearGradient>
        </defs>

        <!-- Car 1 (rear) -->
        <g transform="translate(0,8)">
          <rect x="0" y="6" width="72" height="34" rx="9" fill="url(#carBody)"/>
          <rect x="0" y="6" width="72" height="3" rx="2" fill="#f4ead5" opacity=".55"/>
          <rect x="6" y="14" width="58" height="14" rx="6" fill="url(#window)"/>
          <circle cx="20" cy="21" r="3.2" fill="#0a1430" opacity=".75"/>
          <circle cx="44" cy="21" r="3.2" fill="#0a1430" opacity=".75"/>
          <rect x="2" y="38" width="68" height="3" rx="1.5" fill="#0a1430" opacity=".4"/>
          <text x="36" y="51" font-family="VT323, monospace" font-size="9" fill="#f4ead5" opacity=".55" text-anchor="middle" letter-spacing="2">QUINN</text>
        </g>
        <!-- Coupler -->
        <rect x="72" y="22" width="6" height="4" fill="#3a4a6e"/>

        <!-- Car 2 (middle) -->
        <g transform="translate(78,8)">
          <rect x="0" y="6" width="72" height="34" rx="9" fill="url(#carBody)"/>
          <rect x="0" y="6" width="72" height="3" rx="2" fill="#f4ead5" opacity=".55"/>
          <rect x="6" y="14" width="58" height="14" rx="6" fill="url(#window)"/>
          <circle cx="20" cy="21" r="3.2" fill="#0a1430" opacity=".75"/>
          <circle cx="44" cy="21" r="3.2" fill="#0a1430" opacity=".75"/>
          <rect x="2" y="38" width="68" height="3" rx="1.5" fill="#0a1430" opacity=".4"/>
          <text x="36" y="51" font-family="VT323, monospace" font-size="9" fill="#f4ead5" opacity=".55" text-anchor="middle" letter-spacing="2">LISA</text>
        </g>
        <!-- Coupler -->
        <rect x="150" y="22" width="6" height="4" fill="#3a4a6e"/>

        <!-- Car 3 (front) -->
        <g transform="translate(156,8)">
          <path d="M0 15 Q0 6 9 6 L66 6 Q72 6 76 12 L76 38 Q76 40 74 40 L0 40 Z" fill="url(#carBody)"/>
          <path d="M0 15 Q0 6 9 6 L66 6 Q72 6 76 12 L76 9 Q72 6 66 6 L9 6 Q0 6 0 15 Z" fill="#f4ead5" opacity=".55"/>
          <path d="M6 14 L62 14 Q68 14 70 18 L70 26 Q70 28 68 28 L6 28 Q4 28 4 26 L4 16 Q4 14 6 14 Z" fill="url(#window)"/>
          <circle cx="20" cy="21" r="3.2" fill="#0a1430" opacity=".75"/>
          <circle cx="44" cy="21" r="3.2" fill="#0a1430" opacity=".75"/>
          <circle cx="62" cy="34" r="1.6" fill="#ffc266"/>
          <rect x="2" y="38" width="72" height="3" rx="1.5" fill="#0a1430" opacity=".4"/>
          <text x="36" y="51" font-family="VT323, monospace" font-size="9" fill="#f4ead5" opacity=".55" text-anchor="middle" letter-spacing="2">JIM</text>
        </g>

        <!-- Headlight glow on front car -->
        <circle cx="222" cy="42" r="6" fill="#ffc266" opacity=".25"/>
      </svg>
    </div>
  </div>

  <div class="strip">
    <span class="dot"></span>
    <span>PAGING MR. MORROW · MR. TOM MORROW</span>
  </div>
</main>

<footer>
  <a href="https://jimdufek.com/">jimdufek.com →</a>
</footer>
</body>
</html>
